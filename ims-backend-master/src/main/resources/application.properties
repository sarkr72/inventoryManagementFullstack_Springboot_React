# Datasource Configuration for both Read and Write
datasource.write.url=${SPRING_DATASOURCE_WRITE_URL}
datasource.read.url=${SPRING_DATASOURCE_READ_URL}
datasource.username=${SPRING_DATASOURCE_USERNAME}
datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS}
jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS}

server.address=0.0.0.0
server.port=8080
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

 
 
 